version: '3.9'
services:
  database:
    build:
      context: ./database
      dockerfile: ../devops/docker/database/Dockerfile
    container_name: tc-database
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - tc-pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - tc-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:7
    container_name: tc-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - tc-mongodata:/data/db
    networks:
      - tc-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  tc-network:
    driver: bridge
    name: tienditacampus-network

volumes:
  tc-pgdata:
    name: tienditacampus-pgdata
  tc-mongodata:
    name: tienditacampus-mongodata
